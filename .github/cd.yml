name: CD — TestFlight

# Triggered by a version tag push (e.g. v1.0.0) or manually via GitHub UI.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ────────────────────────────────────────────────
  # JOB · Archive & Upload to TestFlight
  # ────────────────────────────────────────────────
  release:
    name: 🚀 Release
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            .build
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # ⏸ This step is intentionally on hold.
      # Uncomment the `env` block below once all secrets are added to the repository.
      #
      # Required Secrets (Settings → Secrets → Actions):
      #   APP_STORE_CONNECT_API_KEY_ID
      #   APP_STORE_CONNECT_API_ISSUER_ID
      #   APP_STORE_CONNECT_API_KEY_CONTENT   ← base64-encoded .p8 file
      #   MATCH_PASSWORD
      #   MATCH_GIT_BASIC_AUTHORIZATION       ← base64-encoded "username:token"
      - name: Upload to TestFlight
        run: bundle exec fastlane release
        # env:
        #   APP_STORE_CONNECT_API_KEY_ID:       ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        #   APP_STORE_CONNECT_API_ISSUER_ID:    ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        #   APP_STORE_CONNECT_API_KEY_CONTENT:  ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        #   MATCH_PASSWORD:                     ${{ secrets.MATCH_PASSWORD }}
        #   MATCH_GIT_BASIC_AUTHORIZATION:      ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}